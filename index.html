<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <div class="logo-container">
        <img src="https://tse1.mm.bing.net/th/id/OIP.NRy8XdtFHlStQXftZcF2ywAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logotipo de la Empresa">
    </div>

    <h2>Registro de Control de Visitas</h2>
    <p class="subtitle">Registra la visita de un proveedor o visitante de manera rápida y segura. Al enviar, verás un mensaje de confirmación inmediato.</p>
    <div id="message-container"></div>
    <form id="visit-form" action="/register-visit" method="POST">
        <div class="grid-layout">
            
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="hora">Hora de Ingreso</label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <div class="form-group">
                <label for="nombre_entidad">Nombre Completo / Entidad</label>
                <input type="text" id="nombre_entidad" name="nombre_entidad" placeholder="Ej. Juan Pérez o Empresa XYZ" required>
            </div>

            <div class="form-group">
                <label for="cedula_rif">Cédula / RIF</label>
                <input type="text" id="cedula_rif" name="cedula_rif" placeholder="Documento de identidad" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. +58 412..." required>
            </div>

            <div class="form-group">
                <label for="tipo_contacto">Tipo de Contacto</label>
                <select id="tipo_contacto" name="tipo_contacto">
                    <option value="Individual">Individual</option>
                    <option value="Empresa">Empresa</option>
                    <option value="Organización">Organización</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipo_visita">Tipo de Visita</label>
                <select id="tipo_visita" name="tipo_visita">
                    <option value="Técnica">Técnica</option>
                    <option value="Administrativa">Administrativa</option>
                    <option value="Comercial">Comercial</option>
                    <option value="Personal">Personal</option>
                    <option value="Inspección">Inspección</option>
                    <option value="Soporte">Soporte</option>
                </select>
            </div>

            <div class="form-group">
                <label for="estatus">Estatus de Visita</label>
                <select id="estatus" name="estatus">
                    <option value="Planificada">Planificada</option>
                    <option value="No Programada">No Programada</option>
                    <option value="Emergencia">Emergencia</option>
                    <option value="En Curso">En Curso</option>
                    <option value="Completada">Completada</option>
                </select>
            </div>

            <div class="form-group">
                <label for="codigo_ot">Código OT (Opcional)</label>
                <input type="text" id="codigo_ot" name="codigo_ot" placeholder="Código de orden de trabajo">
            </div>

            <div class="form-group full-width">
                <label for="detalle_ot">Detalle OT (Opcional)</label>
                <textarea id="detalle_ot" name="detalle_ot" rows="2" placeholder="Detalle de la orden de trabajo"></textarea>
            </div>

            <button type="submit" class="btn-submit full-width">Registrar Visita</button>
        </div>
    </form>
</div>

<script>
const form = document.getElementById('visit-form');
const messageContainer = document.getElementById('message-container');

function createMessageCard(message, success = true) {
  const card = document.createElement('div');
  card.className = success ? 'success-card' : 'error-card';
  card.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="${success ? '#a7f3d0' : '#fecaca'}"/>
      <path d="M7 12.5L10 15.5L17 8.5" stroke="${success ? '#166534' : '#991b1b'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>${success ? 'Registro Exitoso' : 'Error'}</h3>
    <p>${message}</p>
  `;
  return card;
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  messageContainer.innerHTML = '';

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch(form.action, {
      method: 'POST',
      headers: {
        'Accept': 'application/json'
      },
      body: formData
    });

    const result = await response.json().catch(() => ({ success: response.ok, message: response.statusText }));
    const card = createMessageCard(result.message || 'Solicitud procesada', response.ok && result.success !== false);
    messageContainer.appendChild(card);

    if (response.ok && result.success) {
      form.reset();
    }
  } catch (err) {
    const card = createMessageCard('No se pudo conectar con el servidor. Intenta de nuevo.', false);
    messageContainer.appendChild(card);
  }
});
</script>

</body>
</html>
