<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitas</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="form-container">
    <h2>Registro de Control de Usuarios</h2>
    <p class="subtitle">Registra la visita de un proveedor o visitante de manera rápida y segura. Al enviar, verás un mensaje de confirmación inmediato.</p>
    <div id="message-container"></div>
    <div class="back-row">
        <a href="/menu" class="btn-secondary back-btn">Volver al inicio</a>
    </div>
    <form id="visit-form" action="/register-visit" method="POST">
        <div class="grid-layout">
            
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="hora">Hora de Ingreso</label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <div class="form-group">
              <label for="nombre_completo">Nombre Completo</label>
              <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="Sexo">Sexo</label>
                <select id="Sexo" name="Sexo">
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Edad">Edad</label>
                <input type="number" id="Edad" name="Edad" placeholder="Edad" required>
            </div>

            <div class="form-group">
                <label for="motivo_visita">Motivo de Visita</label>
                <input type="text" id="motivo_visita" name="motivo_visita" placeholder="Ej. Declaracion de Accidentes">
            </div>

            <div class="form-group">
                <label for="cedula_rif">Cédula / RIF</label>
                <input type="number" id="cedula_rif" name="cedula_rif" placeholder="Documento de identidad" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="number" id="telefono" name="telefono" placeholder="Ej. +58 412..." required>
            </div>

            <div class="form-group">
                <label for="municipio">Municipio</label>
                <select id="municipio" name="municipio">
                  <!-- <option value="Municipios">Municipios</option> -->
                  <option value="Agua Blanca">Agua Blanca</option>
                  <option value="Araure">Araure</option>
                  <option value="Esteller">Esteller</option>
                  <option value="Guanare">Guanare</option>
                  <option value="Guanarito">Guanarito</option>
                  <option value="Monseñor José Vicente de Unda">Monseñor José Vicente de Unda</option>
                  <option value="Ospino">Ospino</option>
                  <option value="Páez" selected>Páez</option><!-- Esto sirve para definir el municipio por defecto -->
                  <option value="Papelón">Papelón</option>
                  <option value="San Genaro de Boconoíto">San Genaro de Boconoíto</option>
                  <option value="San Rafael de Onoto">San Rafael de Onoto</option>
                  <option value="Santa Rosalía">Santa Rosalía</option>
                  <option value="Sucre">Sucre</option>
                  <option value="Turén">Turén</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sector">Sector</label>
                <select id="sector" name="sector">
                    <option value="Publico">Público</option>
                    <option value="Privado">Privado</option>
                </select>
            </div>

            <div class="form-group">
              <label for="entidad">Entidad</label>
              <input type="text" id="entidad" name="entidad" placeholder="Ej. Empresa XYZ">
            </div>

            <div class="form-group">
              <label for="cargo">Cargo</label>
              <input type="text" id="cargo" name="cargo" placeholder="Ej. Gerente de Ventas">
            </div>

            <div class="form-group">
              <label for="funcion">Función</label>
                <select id="funcion" name="funcion">
                    <option value="DDP">Delegado de Prevención</option>
                    <option value="CSSL">Comité de Seguridad y Salud Laboral</option>
                    <option value="SERV">Servicio de Salud</option>
                    <option value="TRAB" selected>Trabajador</option>
                    <option value="OTRO">Otro</option>
                </select>
            </div>

            <!-- <div class="form-group">
              <label for="estatus">Estatus de la Solicitud</label>
                <select id="estatus" name="estatus">
                    <option value="Procesada">Procesada</option>
                    <option value="Rechasada">Rechazada</option>
                    <option value="En Revision">En Revisión</option>
                    <option value="Otras">Otras</option>
                </select>
            </div> -->

            <div class="form-group">
                <label for="actividad_economica">Actividad Económica</label>
                <input type="text" id="actividad_economica" name="actividad_economica" placeholder="Ej. Industria">
            </div>

            <div class="form-group">
                <label for="estatus">Estatus de la Solicitud</label>
                <select id="estatus" name="estatus">
                    <option value="Procesada">Procesada</option>
                    <option value="Rechasada">Rechazada</option>
                    <option value="En Revision">En Revisión</option>
                    <option value="Otras">Otras</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Cordinacion_Referida">Coordinación Referida</label>
                <select id="Cordinacion_Referida" name="Cordinacion_Referida">
                    <option value="Inspecciones">Inspecciones</option>
                    <option value="Educacion">Educación</option>
                    <option value="Sanciones">Sanciones</option>
                    <option value="Salud laboral">Salud laboral</option>
                    <option value="Psicosocial">Psicosocial</option>
                    <option value="Epidemiologia">Epidemiología</option>
                </select>
            </div>

            <div class="form-group">
                <label for="funcionario">Funcionario</label>
                <input type="text" id="funcionario" name="funcionario" placeholder="Nombre del funcionario">
            </div>



            <div class="form-group checkbox-group full-width">
              <label class="checkbox-label">
                <input type="checkbox" id="toggle-observaciones" name="toggle_observaciones">
                Añadir Observaciones
              </label>
            </div>

            <div id="observaciones-fields" class="hidden-fields full-width">
              <div class="form-group full-width">
                <label for="observaciones">Observaciones (Opcional)</label>
                <textarea id="observaciones" name="observaciones" rows="4" placeholder="Escribe observaciones adicionales aquí"></textarea>
              </div>
            </div>

            <div class="form-group checkbox-group full-width">
              <label class="checkbox-label">
                <input type="checkbox" id="toggle-ot" name="toggle_ot">
                Añadir Código OT
              </label>
            </div>

            <div id="ot-fields" class="hidden-fields full-width">
              <div class="form-group full-width">
                <label for="codigo_ot">Código OT (Opcional)</label>
                <input type="text" id="codigo_ot" name="codigo_ot" placeholder="Código de orden de trabajo">
              </div>

              <div class="form-group full-width">
                <label for="detalle_ot">Detalle OT (Opcional)</label>
                <textarea id="detalle_ot" name="detalle_ot" rows="2" placeholder="Detalle de la orden de trabajo"></textarea>
              </div>
            </div>

            <button type="submit" class="btn-submit full-width">Registrar Visita</button>
        </div>
    </form>
</div>

<script>
const form = document.getElementById('visit-form');
const messageContainer = document.getElementById('message-container');

function createMessageCard(message, success = true) {
  const card = document.createElement('div');
  card.className = success ? 'success-card' : 'error-card';
  card.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="${success ? '#a7f3d0' : '#fecaca'}"/>
      <path d="M7 12.5L10 15.5L17 8.5" stroke="${success ? '#166534' : '#991b1b'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>${success ? 'Registro Exitoso' : 'Error'}</h3>
    <p>${message}</p>
  `;
  return card;
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  messageContainer.innerHTML = '';

  const formData = new FormData(form);
  const body = new URLSearchParams(formData);

  try {
    const response = await fetch(form.action, {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body
    });

    const result = await response.json().catch(() => ({ success: response.ok, message: response.statusText }));
    if (response.ok && result.success) {
      const successCard = createMessageCard(result.message || 'Solicitud procesada', true);
      messageContainer.appendChild(successCard);
      window.location.href = `/success?code=${encodeURIComponent(result.codigo_visita)}`;
      return;
    }

    const errorCard = createMessageCard(result.message || 'Ocurrió un error.', false);
    messageContainer.appendChild(errorCard);
  } catch (err) {
    const card = createMessageCard('No se pudo conectar con el servidor. Intenta de nuevo.', false);
    messageContainer.appendChild(card);
  }
});
  const obsToggle = document.getElementById('toggle-observaciones');
  const obsFields = document.getElementById('observaciones-fields');
  const obsTextarea = document.getElementById('observaciones');

  const otToggle = document.getElementById('toggle-ot');
  const otFields = document.getElementById('ot-fields');
  const otCode = document.getElementById('codigo_ot');
  const otDetail = document.getElementById('detalle_ot');

  if (obsToggle) {
    obsToggle.addEventListener('change', () => {
      if (obsToggle.checked) {
        obsFields.style.display = 'block';
      } else {
        obsFields.style.display = 'none';
        if (obsTextarea) obsTextarea.value = '';
      }
    });
    obsFields.style.display = 'none';
  }

  if (otToggle) {
    otToggle.addEventListener('change', () => {
      if (otToggle.checked) {
        otFields.style.display = 'grid';
      } else {
        otFields.style.display = 'none';
        if (otCode) otCode.value = '';
        if (otDetail) otDetail.value = '';
      }
    });
    otFields.style.display = 'none';
  }
</script>

</body>
</html>
