<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <div class="success-card" id="success-card">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="#a7f3d0"/>
                <path d="M7 12.5L10 15.5L17 8.5" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h3>Registro Exitoso</h3>
            <p id="success-message">Tu visita se ha registrado correctamente.</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const messageElement = document.getElementById('success-message');
        if (code) {
            messageElement.textContent = `Código: ${code}`;
        }
    </script>
</body>
</html>
