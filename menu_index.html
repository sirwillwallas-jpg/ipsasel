<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú del Sistema - INPSASEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/menu_style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://tse3.mm.bing.net/th/id/OIP.EM3DltdiNLHzZh23cV-MYQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo INPSASEL" class="logo">
                <h2>Sistema de Registro de Visitas de INPSASEL GENESAT Portuguesa</h2>
            </div>

            <nav class="sidebar-menu">
                <div class="menu-section">
                    <h3>Visita</h3>
                    <ul class="menu-list">
                        <li><a class="menu-btn" href="/register-visit">Registrar</a></li>
                        <li><a class="menu-btn" href="/modify-visit">Modificar</a></li>
                        <li><a class="menu-btn" href="/delete-visit">Eliminar</a></li>
                    </ul>
                </div>

                <div class="menu-section">
                    <h3>Reportes</h3>
                    <ul class="menu-list">
                        <li><a class="menu-btn" href="/visitas-del-dia">Visitas del día</a></li>
                        <!-- <li><button class="menu-btn">Visitas por departamento</button></li> -->
                    </ul>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="welcome-card">
                <h1>Bienvenido al Sistema</h1>
                <p>Seleccione una opción en el menú lateral para comenzar.</p>
            </div>
        </main>

    </div>

</body>
</html>
