<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitas</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="form-container">
    <h2>Registro de Control de Visitas</h2>
    <p class="subtitle">Registra la visita de un proveedor o visitante de manera rápida y segura. Al enviar, verás un mensaje de confirmación inmediato.</p>
    <div id="message-container"></div>
    <div class="back-row">
        <a href="/menu" class="btn-secondary back-btn">Volver al inicio</a>
    </div>
    <form id="visit-form" action="/register-visit" method="POST">
        <div class="grid-layout">
            
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="hora">Hora de Ingreso</label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <div class="form-group">
              <label for="nombre_completo">Nombre Completo</label>
              <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
              <label for="entidad">Entidad</label>
              <input type="text" id="entidad" name="entidad" placeholder="Ej. Empresa XYZ">
            </div>

            <div class="form-group">
                <label for="cedula_rif">Cédula / RIF</label>
                <input type="text" id="cedula_rif" name="cedula_rif" placeholder="Documento de identidad" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. +58 412..." required>
            </div>

            <div class="form-group">
                <label for="tipo_contacto">Tipo de Contacto</label>
                <select id="tipo_contacto" name="tipo_contacto">
                    <option value="Individual">Individual</option>
                    <option value="Empresa">Empresa</option>
                    <option value="Organización">Organización</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipo_visita">Tipo de Visita</label>
                <select id="tipo_visita" name="tipo_visita">
                    <option value="Técnica">Técnica</option>
                    <option value="Administrativa">Administrativa</option>
                    <option value="Comercial">Comercial</option>
                    <option value="Personal">Personal</option>
                    <option value="Inspección">Inspección</option>
                    <option value="Soporte">Soporte</option>
                </select>
            </div>

            <div class="form-group">
                <label for="estatus">Estatus de Visita</label>
                <select id="estatus" name="estatus">
                    <option value="Planificada">Planificada</option>
                    <option value="No Programada">No Programada</option>
                    <option value="Emergencia">Emergencia</option>
                    <option value="En Curso">En Curso</option>
                    <option value="Completada">Completada</option>
                </select>
            </div>

            <div class="form-group checkbox-group full-width">
                <label class="checkbox-label">
                    <input type="checkbox" id="toggle-ot" name="toggle_ot">
                    Añadir Código OT
                </label>
            </div>

            <div id="ot-fields" class="hidden-fields full-width">
                <div class="form-group full-width">
                    <label for="codigo_ot">Código OT (Opcional)</label>
                    <input type="text" id="codigo_ot" name="codigo_ot" placeholder="Código de orden de trabajo">
                </div>

                <div class="form-group full-width">
                    <label for="detalle_ot">Detalle OT (Opcional)</label>
                    <textarea id="detalle_ot" name="detalle_ot" rows="2" placeholder="Detalle de la orden de trabajo"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit full-width">Registrar Visita</button>
        </div>
    </form>
</div>

<script>
const form = document.getElementById('visit-form');
const messageContainer = document.getElementById('message-container');
const tipoContactoSelect = document.getElementById('tipo_contacto');
const nombreCompletoInput = document.getElementById('nombre_completo');
const entidadInput = document.getElementById('entidad');

function updateContactRequirements() {
  const tipoContacto = tipoContactoSelect.value;
  if (tipoContacto === 'Individual') {
    nombreCompletoInput.required = true;
    entidadInput.required = false;
  } else {
    nombreCompletoInput.required = false;
    entidadInput.required = true;
  }
}

function createMessageCard(message, success = true) {
  const card = document.createElement('div');
  card.className = success ? 'success-card' : 'error-card';
  card.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="${success ? '#a7f3d0' : '#fecaca'}"/>
      <path d="M7 12.5L10 15.5L17 8.5" stroke="${success ? '#166534' : '#991b1b'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>${success ? 'Registro Exitoso' : 'Error'}</h3>
    <p>${message}</p>
  `;
  return card;
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  messageContainer.innerHTML = '';

  const formData = new FormData(form);
  const body = new URLSearchParams(formData);

  try {
    const response = await fetch(form.action, {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body
    });

    const result = await response.json().catch(() => ({ success: response.ok, message: response.statusText }));
    if (response.ok && result.success) {
      const successCard = createMessageCard(result.message || 'Solicitud procesada', true);
      messageContainer.appendChild(successCard);
      window.location.href = `/success?code=${encodeURIComponent(result.codigo_visita)}`;
      return;
    }

    const errorCard = createMessageCard(result.message || 'Ocurrió un error.', false);
    messageContainer.appendChild(errorCard);
  } catch (err) {
    const card = createMessageCard('No se pudo conectar con el servidor. Intenta de nuevo.', false);
    messageContainer.appendChild(card);
  }
});
  const otToggle = document.getElementById('toggle-ot');
  const otFields = document.getElementById('ot-fields');
  const otCode = document.getElementById('codigo_ot');
  const otDetail = document.getElementById('detalle_ot');

  otToggle.addEventListener('change', () => {
    if (otToggle.checked) {
      otFields.style.display = 'grid';
    } else {
      otFields.style.display = 'none';
      otCode.value = '';
      otDetail.value = '';
    }
  });

  otFields.style.display = 'none';

  tipoContactoSelect.addEventListener('change', updateContactRequirements);
  updateContactRequirements();
</script>

</body>
</html>
