<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Formulario de edicion de visitas: reutiliza la misma estructura visual del registro. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Visita</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="form-container">
    <h2>Modificar Registro de Visita</h2>
    <p class="subtitle">Busca la visita por código y actualiza los detalles. Si cambias el código OT, completa también el detalle.</p>
    <div class="back-row">
        <a href="/menu" class="btn-secondary back-btn">Volver al inicio</a>
    </div>

    <div class="form-group full-width">
        <label for="search_codigo_visita">Buscar Visita por Código</label>
        <div class="search-inline">
            <input type="text" id="search_codigo_visita" placeholder="Ingresa código de visita o nombre" />
            <button type="button" id="search-button" class="btn-secondary">Buscar</button>
        </div>
        <div id="search-results" class="search-results"></div>
    </div>

    <form id="modify-form" action="/modify-visit" method="POST" style="display:none;">
        <div class="grid-layout">
            <div class="form-group full-width">
                <label for="codigo_visita">Código de Visita</label>
                <input type="text" id="codigo_visita" name="codigo_visita" placeholder="Ej. VIS-1684096828000" readonly required>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="hora">Hora de Ingreso</label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <div class="form-group">
              <label for="nombre_completo">Nombre Completo</label>
              <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
              <label for="Sexo">Sexo</label>
              <select id="Sexo" name="Sexo">
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="form-group">
              <label for="Edad">Edad</label>
              <input type="number" id="Edad" name="Edad" placeholder="Edad" required>
            </div>

            <div class="form-group">
              <label for="entidad">Entidad</label>
              <input type="text" id="entidad" name="entidad" placeholder="Ej. Empresa XYZ">
            </div>

            <div class="form-group">
                <label for="motivo_visita">Motivo de Visita</label>
                <input type="text" id="motivo_visita" name="motivo_visita" placeholder="Ej. Consulta sobre procedimiento">
            </div>

            <div class="form-group">
                <label for="cedula_rif">Cédula / RIF</label>
                <input type="text" id="cedula_rif" name="cedula_rif" placeholder="Documento de identidad" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. +58 412..." required>
            </div>

            <div class="form-group">
                <label for="municipio">Municipio</label>
                <select id="municipio" name="municipio">
                  <option value="Agua Blanca">Agua Blanca</option>
                  <option value="Araure">Araure</option>
                  <option value="Esteller">Esteller</option>
                  <option value="Guanare">Guanare</option>
                  <option value="Guanarito">Guanarito</option>
                  <option value="Monseñor José Vicente de Unda">Monseñor José Vicente de Unda</option>
                  <option value="Ospino">Ospino</option>
                  <option value="Páez">Páez</option>
                  <option value="Papelón">Papelón</option>
                  <option value="San Genaro de Boconoíto">San Genaro de Boconoíto</option>
                  <option value="San Rafael de Onoto">San Rafael de Onoto</option>
                  <option value="Santa Rosalía">Santa Rosalía</option>
                  <option value="Sucre">Sucre</option>
                  <option value="Turén">Turén</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sector">Sector</label>
                <select id="sector" name="sector">
                    <option value="Publico">Público</option>
                    <option value="Privado">Privado</option>
                </select>
            </div>

            <div class="form-group">
              <label for="cargo">Cargo</label>
              <input type="text" id="cargo" name="cargo" placeholder="Ej. Gerente de Ventas">
            </div>

            <div class="form-group">
                <label for="tipo_contacto">Tipo de Contacto</label>
                <select id="tipo_contacto" name="tipo_contacto">
                    <option value="Individual">Individual</option>
                    <option value="Empresa">Empresa</option>
                    <option value="Organización">Organización</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipo_visita">Tipo de Visita</label>
                <select id="tipo_visita" name="tipo_visita">
                    <option value="Técnica">Técnica</option>
                    <option value="Administrativa">Administrativa</option>
                    <option value="Comercial">Comercial</option>
                    <option value="Personal">Personal</option>
                    <option value="Inspección">Inspección</option>
                    <option value="Soporte">Soporte</option>
                </select>
            </div>

            <div class="form-group">
              <label for="funcion">Función</label>
                <select id="funcion" name="funcion">
                    <option value="DDP">Delegado de Prevención</option>
                    <option value="CSSL">Comité de Seguridad y Salud Laboral</option>
                    <option value="SERV">Servicio de Salud</option>
                    <option value="TRAB">Trabajador</option>
                    <option value="OTRO">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="actividad_economica">Actividad Económica</label>
                <input type="text" id="actividad_economica" name="actividad_economica" placeholder="Ej. Industria">
            </div>

            <div class="form-group">
              <label for="estatus">Estatus de Visita</label>
              <select id="estatus" name="estatus">
                <option value="Procesada">Procesada</option>
                <option value="Rechasada">Rechazada</option>
                <option value="En Revision">En Revisión</option>
                <option value="Otras">Otras</option>
              </select>
            </div>

            <div class="form-group checkbox-group full-width">
                <label class="checkbox-label">
                    <input type="checkbox" id="toggle-ot" name="toggle_ot">
                    Añadir/Editar Código OT
                </label>
            </div>

            <div class="form-group">
                <label for="Cordinacion_Referida">Coordinación Referida</label>
                <select id="Cordinacion_Referida" name="Cordinacion_Referida">
                    <option value="Inspecciones">Inspecciones</option>
                    <option value="Educacion">Educación</option>
                    <option value="Sanciones">Sanciones</option>
                    <option value="Salud laboral">Salud laboral</option>
                    <option value="Psicosocial">Psicosocial</option>
                    <option value="Epidemiologia">Epidemiología</option>
                </select>
            </div>

            <div class="form-group">
                <label for="funcionario">Funcionario</label>
                <input type="text" id="funcionario" name="funcionario" placeholder="Nombre del funcionario">
            </div>

            <div class="form-group checkbox-group full-width">
              <label class="checkbox-label">
                <input type="checkbox" id="toggle-observaciones" name="toggle_observaciones">
                Añadir Observaciones
              </label>
            </div>

            <div id="observaciones-fields" class="hidden-fields full-width">
              <div class="form-group full-width">
                <label for="observaciones">Observaciones (Opcional)</label>
                <textarea id="observaciones" name="observaciones" rows="4" placeholder="Escribe observaciones adicionales aquí"></textarea>
              </div>
            </div>

            <div id="ot-fields" class="hidden-fields full-width">
                <div class="form-group full-width">
                    <label for="codigo_ot">Código OT</label>
                    <input type="text" id="codigo_ot" name="codigo_ot" placeholder="Código de orden de trabajo">
                </div>

                <div class="form-group full-width">
                    <label for="detalle_ot">Detalle OT</label>
                    <textarea id="detalle_ot" name="detalle_ot" rows="2" placeholder="Detalle de la orden de trabajo"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit full-width">Guardar cambios</button>
        </div>
    </form>
</div>

<script>
const otToggle = document.getElementById('toggle-ot');
const otFields = document.getElementById('ot-fields');
const otCode = document.getElementById('codigo_ot');
const otDetail = document.getElementById('detalle_ot');
const obsToggle = document.getElementById('toggle-observaciones');
const obsFields = document.getElementById('observaciones-fields');
const obsTextarea = document.getElementById('observaciones');

otToggle.addEventListener('change', () => {
  if (otToggle.checked) {
    otFields.style.display = 'grid';
  } else {
    otFields.style.display = 'none';
    otCode.value = '';
    otDetail.value = '';
  }
});

otFields.style.display = 'none';
if (obsFields) obsFields.style.display = 'none';

const searchInput = document.getElementById('search_codigo_visita');
const searchButton = document.getElementById('search-button');
const searchResults = document.getElementById('search-results');
const modifyForm = document.getElementById('modify-form');
const visitCodeInput = document.getElementById('codigo_visita');
const tipoContactoSelect = document.getElementById('tipo_contacto');
const nombreCompletoInput = document.getElementById('nombre_completo');
const entidadInput = document.getElementById('entidad');

function updateContactRequirements() {
  const tipoContacto = tipoContactoSelect.value;
  if (tipoContacto === 'Individual') {
    nombreCompletoInput.required = true;
    entidadInput.required = false;
  } else {
    nombreCompletoInput.required = false;
    entidadInput.required = true;
  }
}

function createSearchItem(visit) {
  const item = document.createElement('div');
  item.className = 'search-item';
  const displayName = visit.entidad || visit.nombre_completo || visit.nombre_entidad || 'Sin nombre';
  item.innerHTML = `
    <div>
      <strong>${visit.codigo_visita}</strong> — ${displayName}<br>
      ${visit.fecha} ${visit.hora} • ${visit.tipo_visita} • ${visit.estatus}
    </div>
    <button class="btn-secondary">Editar</button>
  `;
  item.querySelector('button').addEventListener('click', () => {
    loadVisit(visit);
  });
  return item;
}

function showSearchResults(visits) {
  searchResults.innerHTML = '';
  if (!visits.length) {
    searchResults.textContent = 'No se encontraron visitas con ese código.';
    return;
  }
  visits.forEach((visit) => searchResults.appendChild(createSearchItem(visit)));
}

function loadVisit(visit) {
  modifyForm.style.display = 'block';
  searchResults.innerHTML = '';
  visitCodeInput.value = visit.codigo_visita;
  document.getElementById('fecha').value = visit.fecha;
  document.getElementById('hora').value = visit.hora;
  document.getElementById('nombre_completo').value = visit.nombre_completo || '';
  document.getElementById('entidad').value = visit.entidad || '';
  document.getElementById('cedula_rif').value = visit.cedula_rif || '';
  document.getElementById('telefono').value = visit.telefono || '';
  document.getElementById('tipo_contacto').value = visit.tipo_contacto || 'Individual';
  document.getElementById('tipo_visita').value = visit.tipo_visita || 'Técnica';
  document.getElementById('motivo_visita').value = visit.motivo_visita || visit.tipo_visita || '';
  document.getElementById('estatus').value = visit.estatus || 'Procesada';
  document.getElementById('Sexo').value = visit.sexo || visit.Sexo || 'Masculino';
  document.getElementById('Edad').value = visit.edad || visit.Edad || '';
  document.getElementById('municipio').value = visit.municipio || '';
  document.getElementById('sector').value = visit.sector || '';
  document.getElementById('cargo').value = visit.cargo || '';
  document.getElementById('funcion').value = visit.funcion || '';
  document.getElementById('actividad_economica').value = visit.actividad_economica || '';
  document.getElementById('Cordinacion_Referida').value = visit.cordinacion_referida || visit.Cordinacion_Referida || '';
  document.getElementById('funcionario').value = visit.funcionario || '';
  if (visit.observaciones) {
    if (obsToggle) obsToggle.checked = true;
    if (obsFields) obsFields.style.display = 'block';
    if (obsTextarea) obsTextarea.value = visit.observaciones || '';
  } else {
    if (obsToggle) obsToggle.checked = false;
    if (obsFields) obsFields.style.display = 'none';
    if (obsTextarea) obsTextarea.value = '';
  }
  updateContactRequirements();
  if (visit.codigo_ot) {
    otToggle.checked = true;
    otFields.style.display = 'grid';
    otCode.value = visit.codigo_ot;
    otDetail.value = visit.detalle_ot || '';
  } else {
    otToggle.checked = false;
    otFields.style.display = 'none';
    otCode.value = '';
    otDetail.value = '';
  }
}

searchButton.addEventListener('click', async () => {
  const query = searchInput.value.trim();
  if (!query) {
    searchResults.textContent = 'Escribe un código o nombre para buscar.';
    return;
  }
  searchResults.textContent = 'Buscando...';
  try {
    const response = await fetch(`/api/visitas?codigo_visita=${encodeURIComponent(query)}`);
    const data = await response.json();
    showSearchResults(data.visits || []);
  } catch (err) {
    searchResults.textContent = 'Error al consultar las visitas. Intenta de nuevo.';
  }
});

tipoContactoSelect.addEventListener('change', updateContactRequirements);
updateContactRequirements();
if (obsToggle) {
  obsToggle.addEventListener('change', () => {
    if (obsToggle.checked) {
      if (obsFields) obsFields.style.display = 'block';
    } else {
      if (obsFields) obsFields.style.display = 'none';
      if (obsTextarea) obsTextarea.value = '';
    }
  });
}
</script>

</body>
</html>
